version: '3.8'

services:
  scraper_init:
    # Contenedor ligero para correr sqlite3 y comandos sh
    image: alpine:latest
    container_name: miraprecios_init
    command: >
      sh -c "apk add --no-cache sqlite && sh /app/infra/init-container.sh"
    volumes:
      - shared_data:/app/data
      - ./infra:/app/infra:ro
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    restart: "no"

  frontend:
    # Reemplazamos "build:" por las imágenes compiladas en GitHub Registry
    image: ghcr.io/tiagonatale/miraprecios-web:latest
    container_name: miraprecios_web
    ports:
      - "3000:3000"
    volumes:
      - shared_data:/app/data:ro
    environment:
      - DATABASE_PATH=/app/data/miraprecios.sqlite
    restart: unless-stopped
    depends_on:
      scraper_init:
        condition: service_completed_successfully

  scraper:
    # Reemplazamos "build:" por las imágenes compiladas en GitHub Registry
    image: ghcr.io/tiagonatale/miraprecios-scraper:latest
    container_name: miraprecios_scraper
    volumes:
      - shared_data:/app/data
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    restart: unless-stopped
    depends_on:
      scraper_init:
        condition: service_completed_successfully

volumes:
  shared_data:
    driver: local
