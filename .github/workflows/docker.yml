name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'miraprecios_scraper/**'
      - '.github/workflows/docker.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'miraprecios_scraper/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # Permisos necesarios para publicar en GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # El nombre de la imagen será ghcr.io/tu-usuario/tu-repo/miraprecios-scraper
          images: ghcr.io/${{ env.REPO }}/miraprecios-scraper
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./miraprecios_scraper
          # Solo hacemos push si el evento es un push a la rama (no en pull requests)
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
