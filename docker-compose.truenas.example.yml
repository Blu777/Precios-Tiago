services:
  # ----------------------------------------
  # 1. El Frontend Web (Next.js Standalone)
  # ----------------------------------------
  frontend:
    image: ghcr.io/blu777/precios-tiago/miraprecios-web:latest
    pull_policy: always
    container_name: miraprecios_web
    restart: always
    ports:
      # Puerto expuesto en TrueNAS (9333) apuntando al puerto interno del contenedor (3000)
      - "9333:3000"
    volumes:
      # IMPORTANTE: Cambia esta ruta a la real de tu disco en TrueNAS
      - /mnt/tu_pool/datos/miraprecios/data:/app/data
    environment:
      # Variables vitales para Next.js en producción
      - NODE_ENV=production
      - PORT=3000
      # Permite que la app responda hacia afuera del contenedor
      - HOSTNAME=0.0.0.0 
      - TZ=America/Argentina/Buenos_Aires
      - DATABASE_URL=file:///app/data/miraprecios.db

  # ----------------------------------------
  # 2. El Scraper de Precios (Python)
  # ----------------------------------------
  scraper:
    image: ghcr.io/blu777/precios-tiago/miraprecios-scraper:latest
    pull_policy: always
    container_name: miraprecios_crawler
    restart: "no"
    volumes:
      # La ruta del host debe ser exactamente la misma que la del frontend
      - /mnt/tu_pool/datos/miraprecios/data:/app/data
    environment:
      # Para que los timestamps de guardado reflejen el horario argentino
      - TZ=America/Argentina/Buenos_Aires
