version: '3.8'

services:
  frontend:
    image: ghcr.io/blu777/precios-tiago/miraprecios-web:latest
    container_name: miraprecios_web
    ports:
      - "3000:3000"
    volumes:
      - shared_data:/app/data
    environment:
      - DATABASE_URL=file:///app/data/miraprecios.db
      - TZ=America/Argentina/Buenos_Aires
    restart: unless-stopped

  scraper:
    image: ghcr.io/blu777/precios-tiago/miraprecios-scraper:latest
    container_name: miraprecios_scraper
    volumes:
      - shared_data:/app/data
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=America/Argentina/Buenos_Aires
      - DB_PATH=/app/data/miraprecios.db
      - TURSO_DATABASE_URL=${TURSO_DATABASE_URL:-}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    restart: unless-stopped

volumes:
  shared_data:
    driver: local
